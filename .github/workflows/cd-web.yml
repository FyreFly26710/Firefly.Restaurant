name: CD Web

on:
  push:
    branches:
      - main
    paths:
      - "src/client/web/**"
      - ".github/workflows/cd-web.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight:
    environment: demo
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check required secrets
        id: check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          FIREFLY_MENU_API_BASE_URL: ${{ secrets.FIREFLY_MENU_API_BASE_URL }}
        run: |
          missing=""
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_PAGES_PROJECT_NAME FIREFLY_MENU_API_BASE_URL; do
            if [ -z "$(printenv "$name")" ]; then
              missing="$missing $name"
            fi
          done

          if [ -z "$missing" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Missing web deployment secrets:$missing"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    environment: demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/client/web
    env:
      FIREFLY_MENU_API_BASE_URL: ${{ secrets.FIREFLY_MENU_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/client/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Build static Pages output
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        run: >-
          npx wrangler pages project create "${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}"
          --production-branch=main
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Attach demo custom domain
        run: |
          set -euo pipefail
          response="$(
            curl --silent --show-error \
              --request POST \
              --url "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT_NAME}/domains" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data '{"name":"restaurant.firefly-ai.co.uk"}'
          )"
          echo "$response" | jq --exit-status '.success == true or (.errors // [] | any(.message | test("already|exists"; "i")))'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/client/web
          command: >-
            pages deploy out
            --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
            --branch=${{ github.ref_name }}
