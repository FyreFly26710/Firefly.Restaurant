name: CD Server Images

on:
  push:
    branches:
      - main
    paths:
      - "src/server/**"
      - "infra/docker/**"
      - "infra/deploy/**"
      - ".github/workflows/cd-server-images.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      docker_ready: ${{ steps.docker.outputs.ready }}
    steps:
      - name: Check Docker Hub secrets
        id: docker
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_NAMESPACE" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: preflight
    if: needs.preflight.outputs.docker_ready == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway-api
            image: firefly-restaurant-gateway-api
            dockerfile: infra/docker/Firefly.Restaurant.Gateway.Api.Dockerfile
          - service: menu-api
            image: firefly-restaurant-menu-api
            dockerfile: infra/docker/Firefly.Restaurant.Menu.Api.Dockerfile
          - service: admin-app
            image: firefly-restaurant-admin-app
            dockerfile: infra/docker/Firefly.Restaurant.Admin.App.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:main
